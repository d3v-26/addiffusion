# AdDiffusion Default Configuration
# Reference: research.md §3.6 hyperparameter table

model:
  model_id: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  scheduler: "ddim"
  guidance_scale: 7.5
  resolution: 512
  dtype: "float16"

agent:
  state_dim: 1672  # CLIP_img(768) + CLIP_txt(768) + timestep(128) + quality(8)
  hidden_dim: 512
  num_actions: 3  # continue, stop, refine (D-38)
  warmup_steps: 3  # Mandatory continues (D-16)
  use_clip_features: true
  use_quality_features: true

ppo:
  lr: 0.0001  # Updated from tune_lr sweep (1e-4 > 3e-4 > 1e-3 by final reward)
  batch_size: 64  # Trajectories per PPO update
  gamma_d: 0.99  # Discount factor (D-09: not gamma)
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff_start: 0.05   # high entropy for first 500 iters to avoid collapse
  entropy_coeff_end: 0.01     # c_2 from research.md §3.6
  entropy_anneal_steps: 500
  value_coeff: 0.5  # c_1
  max_grad_norm: 0.5
  ppo_epochs: 4  # K gradient epochs per data collection
  mini_batch_size: 64

reward:
  # Per-step quality weights
  # alpha_3 (DINO stability) zeroed: high DINO sim in late denoising steps was giving
  # +0.75 reward/step for continuing after image converged. Core fix for always-continue.
  # alpha_1/2/4 reduced from Optuna values; per-step signal persists but now subordinate
  # to c_nfe penalty at quality plateau (delta_CLIP near zero → alpha_1 * norm ≈ 0.01 < c_nfe=0.02).
  alpha_1: 0.5    # CLIP delta        (was 2.977)
  alpha_2: 0.3    # Aesthetic delta   (was 1.430)
  alpha_3: 0.0    # DINO stability    (was 0.791) ← ZERO: see note above
  alpha_4: 0.4    # ImageReward delta (was 0.870)

  # Normalization scales (D-37) — unchanged
  clip_norm: 0.05
  aesthetic_norm: 0.3
  image_reward_norm: 0.2

  # Efficiency (D-09: c_nfe not gamma)
  # Raised from 0.01355 so NFE penalty exceeds flat per-step quality at plateau.
  c_nfe: 0.02

  # Terminal reward weights — sum ≈ 2.0 (down from 5.097).
  # Scaled down to work correctly with multiplicative mode.
  beta_1: 1.0     # CLIP        (was 3.105)
  beta_2: 0.4     # Aesthetic   (was 1.349)
  beta_3: 0.6     # ImageReward (was 0.643)

  normalize: true
  baseline_scores_path: "data/baseline_scores.json"

  # Multiplicative efficiency: R_terminal = quality_term × (1 + c_save × savings_ratio)
  # Same quality at step 20 (savings=0.6) → mult=1.9 → 90% more terminal reward than full run.
  terminal_multiplicative: true
  c_save: 1.5     # (was 1.0)

  c_refine: 0.2

refinement:
  method: "attention"  # attention, grid, learned, random (A4 ablation)
  k: 2  # Iterations per refine action
  r_noise: 0.5  # t' = t * r_noise
  mask_threshold: 0.5  # Attention quantile threshold (tau)
  blur_sigma: 3.0  # Gaussian blur for soft masks (D-26)

training:
  total_iterations: 2000
  num_steps: 50  # N_max = scheduler steps
  seed: 42
  checkpoint_every: 50
  eval_every: 100
  log_every: 10

  # Curriculum (D-32)
  curriculum:
    simple_until: 500
    mixed_until: 1200
    # After 1200: full distribution

  # Data
  prompt_dataset: "data/coco/annotations/captions_val2014.json"

logging:
  use_wandb: false
  project: "addiffusion"
  log_images_every: 50  # Steps between image logging
