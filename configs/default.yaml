# AdDiffusion Default Configuration
# Reference: research.md §3.6 hyperparameter table

model:
  model_id: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  scheduler: "ddim"
  guidance_scale: 7.5
  resolution: 512
  dtype: "float16"

agent:
  state_dim: 1672  # CLIP_img(768) + CLIP_txt(768) + timestep(128) + quality(8)
  hidden_dim: 512
  num_actions: 3  # continue, stop, refine (D-38)
  warmup_steps: 3  # Mandatory continues (D-16)
  use_clip_features: true
  use_quality_features: true

ppo:
  lr: 0.0001  # Updated from tune_lr sweep (1e-4 > 3e-4 > 1e-3 by final reward)
  batch_size: 64  # Trajectories per PPO update
  gamma_d: 0.99  # Discount factor (D-09: not gamma)
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff_start: 0.05   # high entropy for first 500 iters to avoid collapse
  entropy_coeff_end: 0.01     # c_2 from research.md §3.6
  entropy_anneal_steps: 500
  value_coeff: 0.5  # c_1
  max_grad_norm: 0.5
  ppo_epochs: 4  # K gradient epochs per data collection
  mini_batch_size: 64

reward:
  # Quality delta weights
  # Updated from Optuna sweep (47 trials, best=trial #13, objective=55.47)
  # Sweep found CLIP and stability are far more important than research.md defaults assumed.
  # Old: alpha_1=1.0, alpha_2=0.5, alpha_3=0.2, alpha_4=0.8 (research.md §3.6 priors)
  alpha_1: 2.977  # CLIP delta        (was 1.0 — tripled; CLIP alignment is the dominant signal)
  alpha_2: 1.430  # Aesthetic delta   (was 0.5 — doubled; aesthetic improvement matters more than expected)
  alpha_3: 0.791  # Stability (DINO sim, D-11)  (was 0.2 — quadrupled; temporal consistency is critical for stop decisions)
  alpha_4: 0.870  # ImageReward delta (was 0.8 — nearly unchanged; prior was already well-calibrated)

  # Normalization scales (D-37) — unchanged, these are fixed by metric ranges not tuned
  clip_norm: 0.05
  aesthetic_norm: 0.3
  image_reward_norm: 0.2

  # Efficiency (D-09: c_nfe not gamma)
  # Old: 0.01 (research.md §3.6 prior) — slight increase allows agent to be marginally more
  # aggressive about penalising extra steps without collapsing to always-stop.
  c_nfe: 0.01355

  # Terminal reward weights
  # Sweep shifted weight from ImageReward toward CLIP — final image prompt alignment
  # is a stronger training signal than holistic human preference at this scale.
  # Old: beta_1=2.0, beta_2=1.0, beta_3=1.5 (research.md §3.6 priors)
  beta_1: 3.105  # CLIP        (was 2.0 — increased; terminal CLIP is the clearest success signal)
  beta_2: 1.349  # Aesthetic   (was 1.0 — modest increase)
  beta_3: 0.643  # ImageReward (was 1.5 — halved; IR is noisy at short training runs, sweep deprioritised it)

  normalize: true  # D-37
  baseline_scores_path: "data/baseline_scores.json"
  c_save: 1.0    # step-savings weight: saving all N_max steps ≈ going from DDIM-20 to DDIM-50 quality
  c_refine: 0.2  # attention-entropy refine bonus weight

refinement:
  method: "attention"  # attention, grid, learned, random (A4 ablation)
  k: 2  # Iterations per refine action
  r_noise: 0.5  # t' = t * r_noise
  mask_threshold: 0.5  # Attention quantile threshold (tau)
  blur_sigma: 3.0  # Gaussian blur for soft masks (D-26)

training:
  total_iterations: 2000
  num_steps: 50  # N_max = scheduler steps
  seed: 42
  checkpoint_every: 50
  eval_every: 100
  log_every: 10

  # Curriculum (D-32)
  curriculum:
    simple_until: 500
    mixed_until: 1200
    # After 1200: full distribution

  # Data
  prompt_dataset: "data/coco/annotations/captions_val2014.json"

logging:
  use_wandb: false
  project: "addiffusion"
  log_images_every: 50  # Steps between image logging
